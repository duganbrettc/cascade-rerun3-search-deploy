services:
  db:
    build:
      context: ./db
    environment:
      POSTGRES_USER: sift
      POSTGRES_PASSWORD: sift
      POSTGRES_DB: sift
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sift"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://sift:sift@db:5432/sift?sslmode=disable
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build:
      context: ./web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HOST_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
