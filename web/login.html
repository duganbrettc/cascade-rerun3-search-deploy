<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sift - Log In</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Log In</h1>
      <div id="error-msg" class="error" style="display:none"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required>
        </div>
        <button type="submit">Log In</button>
      </form>
      <p class="auth-footer">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(evt) {
      evt.preventDefault();
      var errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed. Check your credentials.';
          errEl.style.display = 'block';
          return;
        }
        localStorage.setItem('token', data.token || data.session_token);
        location.href = '/';
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
