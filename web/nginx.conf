server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream/healthz;
    }

    location = /signup {
        try_files /signup.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location = /post {
        try_files /post.html =404;
    }

    location = /profile {
        try_files /profile.html =404;
    }

    location = /users {
        try_files /users.html =404;
    }

    location = /search {
        try_files /search.html =404;
    }

    location ~ ^/users/.+ {
        try_files /users/profile.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
